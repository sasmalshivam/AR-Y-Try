services:
  # Node.js Backend API
  - type: web
    name: ar-ecommerce-api
    env: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: FRONTEND_URL
        fromService:
          type: static_site
          name: ar-ecommerce-web
          property: url

  # Vite Frontend Static Site
  - type: static_site
    name: ar-ecommerce-web
    env: static
    rootDir: client
    buildCommand: npm install && npm run build
    publishDir: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: ar-ecommerce-api
          property: url
