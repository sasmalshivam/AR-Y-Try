<!DOCTYPE html>
<html>
<head>
  <title>Generate Icons</title>
  <style>
    body { font-family: sans-serif; padding: 20px; background: #111; color: #fff; }
    canvas { border-radius: 20%; margin: 10px; display: inline-block; }
    button { margin: 4px; padding: 8px 16px; cursor: pointer; background: #7c3aed; color: white; border: none; border-radius: 6px; }
  </style>
</head>
<body>
  <h2>Virtual Try-On Icon Generator</h2>
  <p>Click buttons to download icons. Place them in the <code>icons/</code> folder.</p>
  <div id="canvases"></div>
  <div id="buttons"></div>
  
  <script>
    const sizes = [16, 32, 48, 128];
    const container = document.getElementById('canvases');
    const btnContainer = document.getElementById('buttons');
    
    sizes.forEach(size => {
      const canvas = document.createElement('canvas');
      canvas.width = canvas.height = size;
      canvas.title = `${size}x${size}`;
      container.appendChild(canvas);
      
      const ctx = canvas.getContext('2d');
      
      // Background gradient with rounded corners
      const r = size * 0.2;
      const grad = ctx.createLinearGradient(0, 0, size, size);
      grad.addColorStop(0, '#7c3aed');
      grad.addColorStop(1, '#4f46e5');
      
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.moveTo(r, 0); ctx.lineTo(size-r, 0);
      ctx.quadraticCurveTo(size, 0, size, r);
      ctx.lineTo(size, size-r);
      ctx.quadraticCurveTo(size, size, size-r, size);
      ctx.lineTo(r, size);
      ctx.quadraticCurveTo(0, size, 0, size-r);
      ctx.lineTo(0, r);
      ctx.quadraticCurveTo(0, 0, r, 0);
      ctx.closePath();
      ctx.fill();
      
      // Sparkle symbol
      ctx.fillStyle = '#fff';
      ctx.font = `bold ${Math.round(size * 0.6)}px serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('✦', size/2, size/2 + size*0.03);
      
      // Download button
      const btn = document.createElement('button');
      btn.textContent = `Download icon${size}.png`;
      btn.onclick = () => {
        const a = document.createElement('a');
        a.download = `icon${size}.png`;
        a.href = canvas.toDataURL('image/png');
        a.click();
      };
      btnContainer.appendChild(btn);
    });
    
    const allBtn = document.createElement('button');
    allBtn.textContent = '⬇ Download All Icons';
    allBtn.style.background = '#10b981';
    allBtn.onclick = () => {
      document.querySelectorAll('[data-download]').forEach(b => b.click());
      const btns = btnContainer.querySelectorAll('button:not(:last-child)');
      btns.forEach((b, i) => setTimeout(() => b.click(), i * 500));
    };
    btnContainer.appendChild(allBtn);
  </script>
</body>
</html>
